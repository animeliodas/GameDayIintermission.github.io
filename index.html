<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEGA QIZ — Speedrun Edition</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1f2e;
      --bg2:        #232938;
      --card-bg:    #2a3147;
      --card-hover: #323c58;
      --accent:     #fa3e20;
      --accent2:    #ff6b47;
      --green:      #00e676;
      --red:        #ff1744;
      --gold:       #ffd600;
      --text:       #e8eaf6;
      --text-dim:   #8892b0;
      --radius:     18px;
      --shadow:     0 8px 32px rgba(0,0,0,0.45);
      --shadow-hover: 0 16px 48px rgba(250,62,32,0.35);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Progress bar ── */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.5s ease;
      z-index: 200;
      border-radius: 0 2px 2px 0;
    }

    /* ── Header ── */
    header {
      padding: 18px 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo span {
      -webkit-text-fill-color: var(--text);
    }

    /* ── Score panel ── */
    .score-panel {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .score-label {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #score {
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 900;
      color: var(--text);
      min-width: 40px;
      text-align: center;
      transition: color 0.3s;
    }
    #score.positive { color: var(--green); }
    #score.negative { color: var(--red); }

    /* ── Pool counter ── */
    #pool-counter {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      padding: 6px 0 0;
      flex-shrink: 0;
    }

    /* ── Main arena ── */
    .arena {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vw, 48px);
      padding: clamp(12px, 2vw, 24px) clamp(12px, 3vw, 48px);
      min-height: 0;
    }

    /* ── VS divider ── */
    .vs-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .vs-badge {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 900;
      font-style: italic;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(250,62,32,0.5));
    }
    .vs-hint {
      font-size: clamp(11px, 1.2vw, 13px);
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
    }

    /* ── Cards ── */
    .card {
      flex: 1;
      max-width: 420px;
      min-width: 0;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      user-select: none;
      border: 2px solid transparent;
      transition:
        transform      0.2s cubic-bezier(.34,1.56,.64,1),
        box-shadow     0.2s ease,
        border-color   0.25s ease,
        background     0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .card:hover:not(.disabled) {
      transform: translateY(-6px) scale(1.015);
      box-shadow: var(--shadow-hover);
      border-color: rgba(250,62,32,0.4);
      background: var(--card-hover);
    }
    .card:active:not(.disabled) {
      transform: translateY(-2px) scale(1.005);
    }
    .card.disabled {
      pointer-events: none;
      cursor: default;
    }
    .card.correct {
      background: #1b4d2e !important;
      border-color: var(--green) !important;
      box-shadow: 0 8px 32px rgba(0,230,118,0.3) !important;
    }
    .card.wrong {
      background: #4d1b1b !important;
      border-color: var(--red) !important;
      box-shadow: 0 8px 32px rgba(255,23,68,0.3) !important;
    }
    .card.draw {
      background: #4d3c00 !important;
      border-color: var(--gold) !important;
      box-shadow: 0 8px 32px rgba(255,214,0,0.3) !important;
    }

    /* Ripple эффект при клике */
    .card .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transform: scale(0);
      animation: ripple 0.55s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* Fade-in анимация карточки */
    .card.fade-in {
      animation: cardIn 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ── Card внутренности ── */
    .card-inner {
      padding: clamp(14px, 2vw, 22px);
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 10px;
    }

    .card-title {
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1.3;
      min-height: 2.6em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-cat {
      font-size: clamp(11px, 1.1vw, 13px);
      color: var(--text-dim);
      text-align: center;
      min-height: 1.4em;
    }

    .card-img-wrap {
      flex: 1;
      min-height: 0;
      border-radius: 10px;
      overflow: hidden;
      background: #1a1f2e;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .card-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    .card-img.loaded { display: block; }
    .img-placeholder {
      font-size: 48px;
      opacity: 0.3;
    }

    /* ── Время ── */
    .card-time-wrap {
      text-align: center;
      padding: 8px 0 4px;
    }
    .card-time {
      font-size: clamp(18px, 2.2vw, 26px);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      display: inline-block;
    }
    /* Анимация появления времени */
    .card-time.reveal {
      animation: timeReveal 0.45s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes timeReveal {
      from { opacity: 0; transform: scale(0.6) translateY(8px); filter: blur(4px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);   filter: blur(0); }
    }
    .card-time.known  { color: var(--green); }
    .card-time.hidden { color: #718096; letter-spacing: 4px; font-size: clamp(22px, 2.8vw, 32px); }

    .card-hint {
      font-size: clamp(10px, 1vw, 12px);
      color: var(--text-dim);
      text-align: center;
      font-style: italic;
      padding-bottom: 4px;
    }

    /* ── Loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(26,31,46,0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 150;
      backdrop-filter: blur(6px);
    }
    #loading h2 {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800;
      color: var(--text);
    }
    #loading-sub {
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
      max-width: 320px;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 5px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #c62828;
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 14px;
      display: none;
      opacity: 0;
      z-index: 999;
      max-width: 90vw;
      text-align: center;
      transition: opacity 0.3s, transform 0.3s;
    }
    #toast.show {
      display: block;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Score pop ── */
    @keyframes scorePop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    .score-pop { animation: scorePop 0.35s cubic-bezier(.34,1.56,.64,1); }

    /* ── Mobile: вертикальная раскладка ── */
    @media (max-width: 700px) or (orientation: portrait) {
      header { padding: 12px 16px 0; }
      .arena {
        flex-direction: column;
        gap: 12px;
        padding: 10px 12px;
        align-items: stretch;
      }
      .card { max-width: 100%; }
      .vs-col { flex-direction: row; justify-content: center; gap: 24px; }
      .vs-badge { font-size: clamp(24px, 6vw, 36px); }
      .vs-hint { display: none; }
      .card-img-wrap { min-height: 180px; max-height: 220px; }
    }

    @media (max-width: 400px) {
      .score-panel { padding: 6px 14px; }
      .logo { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- Progress -->
<div id="progress-bar"></div>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <h2>Загрузка игр…</h2>
  <div id="loading-sub">Подключаемся к speedrun.com</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Header -->
<header>
  <div class="logo">MEGA <span>QIZ</span></div>
  <div class="score-panel">
    <span class="score-label">Счёт</span>
    <div id="score">0</div>
  </div>
</header>

<!-- Pool counter -->
<div id="pool-counter"></div>

<!-- Arena -->
<div class="arena">

  <!-- Card 1 -->
  <div class="card" id="card1" onclick="cardClick(1, event)">
    <div class="card-inner">
      <div class="card-title"  id="gname1">…</div>
      <div class="card-cat"    id="kname1"></div>
      <div class="card-img-wrap">
        <span class="img-placeholder" id="img1-placeholder">🎮</span>
        <img class="card-img" id="img1" alt="" />
      </div>
      <div class="card-time-wrap">
        <div class="card-time known" id="time1"></div>
      </div>
      <div class="card-hint">Время знаем ↑</div>
    </div>
  </div>

  <!-- VS -->
  <div class="vs-col">
    <div class="vs-badge">VS</div>
    <div class="vs-hint">Нажми на карточку<br>с более быстрым рекордом</div>
  </div>

  <!-- Card 2 -->
  <div class="card" id="card2" onclick="cardClick(2, event)">
    <div class="card-inner">
      <div class="card-title"  id="gname2">…</div>
      <div class="card-cat"    id="kname2"></div>
      <div class="card-img-wrap">
        <span class="img-placeholder" id="img2-placeholder">🎮</span>
        <img class="card-img" id="img2" alt="" />
      </div>
      <div class="card-time-wrap">
        <div class="card-time hidden" id="time2">???</div>
      </div>
      <div class="card-hint">Угадай время ↑</div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════ */
const API_BASE    = 'https://www.speedrun.com/api/v1';
const CORS_PROXY  = 'https://corsproxy.io/?url=';   // публичный CORS-прокси
const SWAP_DELAY  = 2000; // мс до следующей пары

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let pool        = [];          // массив TGameRecord-подобных объектов
let gameStarted = false;
let waitSwap    = false;
let score       = 0;
let idx1 = -1, idx2 = -1;
let queue = [], queuePos = 0;
let swapTimer = null;
let totalIds  = 0;  // сколько всего ID в списке

/* ═══════════════════════════════════════════════════════════════
   SCALING (как ScaleLayout в Delphi)
═══════════════════════════════════════════════════════════════ */
function scaleLayout() {
  const root = document.getElementById('root');
  const sx   = window.innerWidth  / 1600;
  const sy   = window.innerHeight / 900;
  const s    = Math.min(sx, sy);
  const nw   = 1600 * s;
  const nh   = 900  * s;
  root.style.transform  = `scale(${s})`;
  root.style.left       = ((window.innerWidth  - nw) / 2) + 'px';
  root.style.top        = ((window.innerHeight - nh) / 2) + 'px';
  root.style.position   = 'absolute';
}
window.addEventListener('resize', scaleLayout);
scaleLayout();

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════════ */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ISO 8601 duration "PT1H2M3.456S" → seconds (float)
function isoToSec(iso) {
  if (!iso || !iso.startsWith('PT')) return 0;
  let s = iso.slice(2), h = 0, m = 0, sec = 0;
  const hm = s.match(/(\d+)H/); if (hm) { h   = +hm[1]; }
  const mm = s.match(/(\d+)M/); if (mm) { m   = +mm[1]; }
  const sm = s.match(/([\d.]+)S/); if (sm) { sec = +sm[1]; }
  return h * 3600 + m * 60 + sec;
}

// ISO 8601 duration → display string "Xч Xм Xс [Xмс]"
function isoToDisplay(iso) {
  const total = isoToSec(iso);
  const h   = Math.floor(total / 3600);
  const m   = Math.floor((total % 3600) / 60);
  const s   = Math.floor(total % 60);
  const ms  = Math.round((total % 1) * 1000);
  let r = '';
  if (h > 0) r += h + 'ч ';
  if (m > 0 || h > 0) r += m + 'м ';
  r += s + 'с';
  if (ms > 0) r += ' ' + ms + 'мс';
  return r.trim();
}

function showToast(msg, dur = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); }, dur);
}

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updatePoolCounter() {
  const el = document.getElementById('pool-counter');
  if (!el) return;
  const target = totalIds || '?';
  if (totalIds > 0 && pool.length >= totalIds) {
    el.textContent = `✓ Загружено ${pool.length} игр`;
  } else {
    el.textContent = `⏳ Загружено игр: ${pool.length} / ${target}`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   API  (с повторами и задержкой при 429)
═══════════════════════════════════════════════════════════════ */
// Кешируем успешный метод (direct / proxy) чтобы не пробовать лишний раз
let _apiMethod = 'direct'; // 'direct' | 'proxy'

async function apiGet(url, maxRetry = 3) {
  let delay = 400;
  for (let i = 0; i <= maxRetry; i++) {
    try {
      let res;
      if (_apiMethod === 'direct') {
        try {
          res = await fetch(url);
        } catch (_) {
          _apiMethod = 'proxy';
          res = await fetch(CORS_PROXY + encodeURIComponent(url));
        }
      } else {
        res = await fetch(CORS_PROXY + encodeURIComponent(url));
      }
      if (res.status === 200) return res.json();
      if (res.status === 420 || res.status === 429) {
        console.warn(`Rate limited (${res.status}) — waiting 15s...`);
        await sleep(15000);
        continue;
      }
    } catch (_) {}
    if (i < maxRetry) await sleep(delay);
    delay = Math.min(delay * 2, 8000);
  }
  return null;
}

async function imageExists(url) {
  if (!url) return false;
  // Проверяем загрузкой через Image — работает без CORS-ограничений для изображений
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = url;
  });
}

function buildCoverURL(apiId) {
  return `https://www.speedrun.com/static/game/${apiId}/cover?v=1`;
}

/* ═══════════════════════════════════════════════════════════════
   FETCH ONE GAME BY ID/SLUG
   → record { id, gameName, catName, wrTime, wrTimeSec, image }
═══════════════════════════════════════════════════════════════ */
async function fetchOneBySlug(slug) {
  // 1. Game info — пробуем сначала как abbreviation, потом как id
  let data = null;
  const j1 = await apiGet(`${API_BASE}/games/${slug}`);
  if (j1 && j1.data) {
    data = j1.data;
  } else {
    const j2 = await apiGet(`${API_BASE}/games?abbreviation=${encodeURIComponent(slug)}&max=1`);
    if (j2 && j2.data && j2.data.length > 0) data = j2.data[0];
  }
  if (!data) {
    console.warn(`[skip] не найдена игра: ${slug}`);
    return null;
  }

  const apiId    = data.id;
  const gameName = (data.names && data.names.international) || slug;
  let   coverURL = (data.assets && data.assets['cover-large']  && data.assets['cover-large'].uri)
                || (data.assets && data.assets['cover-medium'] && data.assets['cover-medium'].uri)
                || buildCoverURL(apiId);

  // 2. Категория + проверка обложки — параллельно
  const [catResult, coverOK] = await Promise.all([
    (async () => {
      const jc = await apiGet(`${API_BASE}/games/${apiId}/categories?miscellaneous=no`);
      if (!jc || !jc.data) return null;
      for (const cat of jc.data) {
        if (cat.type === 'per-game') return { id: cat.id, name: cat.name };
      }
      // Нет per-game категорий — берём первую любую
      if (jc.data.length > 0) return { id: jc.data[0].id, name: jc.data[0].name };
      return null;
    })(),
    (async () => {
      let ok = await imageExists(coverURL);
      if (!ok) {
        const fb = buildCoverURL(apiId);
        if (fb !== coverURL) { ok = await imageExists(fb); if (ok) coverURL = fb; }
      }
      // Если обложка не найдена — используем fallback без проверки
      if (!ok) coverURL = buildCoverURL(apiId);
      return true; // не блокируем из-за обложки
    })()
  ]);

  if (!catResult) {
    console.warn(`[skip] нет категорий: ${slug}`);
    return null;
  }

  // 3. Мировой рекорд
  const jl = await apiGet(
    `${API_BASE}/leaderboards/${apiId}/category/${catResult.id}?top=1`
  );
  if (!jl || !jl.data || !jl.data.runs || jl.data.runs.length === 0) {
    console.warn(`[skip] нет рекордов: ${slug} / cat ${catResult.id}`);
    return null;
  }
  const primary = jl.data.runs[0].run.times.primary;
  if (!primary) return null;

  return {
    id:        slug,
    gameName:  gameName,
    catName:   catResult.name,
    wrTime:    primary,
    wrTimeSec: isoToSec(primary),
    image:     coverURL
  };
}

/* ═══════════════════════════════════════════════════════════════
   PRE-CREATED  (Pre-created.json — только список ID)
   Загружаем ID → фетчим каждую игру через API → добавляем в пул
═══════════════════════════════════════════════════════════════ */
async function loadPreCreated() {
  let ids = [];
  try {
    const res = await fetch('./Pre-created.json');
    if (!res.ok) return;
    const json = await res.json();
    ids = (json.games || []).map(g => g.id).filter(Boolean);
  } catch (_) { return; }

  if (ids.length === 0) return;

  // Перемешиваем чтобы каждый старт давал разный порядок
  shuffle(ids);
  totalIds = ids.length;
  updatePoolCounter();

  // Загружаем по одной — так не нагружаем API и не получаем 429
  for (const id of ids) {
    const rec = await fetchOneBySlug(id);
    if (rec) addToPool(rec);
    // Небольшая пауза между запросами чтобы не триггерить rate limit
    await sleep(300);
  }
}

/* ═══════════════════════════════════════════════════════════════
   POOL MANAGEMENT
═══════════════════════════════════════════════════════════════ */
function addToPool(rec) {
  pool.push(rec);
  setProgress(totalIds > 0 ? Math.min(100, pool.length / totalIds * 100) : 0);
  updateLoadingText();
  updatePoolCounter();
  tryStartGame();
}

function updateLoadingText() {
  const sub = document.getElementById('loading-sub');
  if (sub) sub.textContent = `Загружено игр: ${pool.length} / ${totalIds || '?'}`;
}

/* ═══════════════════════════════════════════════════════════════
   QUEUE  (Fisher-Yates shuffle, переход без повторов)
═══════════════════════════════════════════════════════════════ */
function rebuildQueue() {
  queue = pool.map((_, i) => i);
  shuffle(queue);
  queuePos = 0;
}

function nextIndex(excludeIdx) {
  if (pool.length <= 1) return 0;
  let tries = 0;
  while (true) {
    if (queuePos >= queue.length) rebuildQueue();
    const r = queue[queuePos++];
    if (r !== excludeIdx) return r;
    if (++tries > pool.length * 2) {
      // fallback
      let r2;
      do { r2 = Math.floor(Math.random() * pool.length); } while (r2 === excludeIdx);
      return r2;
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   GAME LOGIC
═══════════════════════════════════════════════════════════════ */
function tryStartGame() {
  if (gameStarted) {
    // обновляем очередь при пополнении пула
    rebuildQueue();
    return;
  }
  if (pool.length < 2) return;

  gameStarted = true;
  document.getElementById('loading').style.display = 'none';

    rebuildQueue();
  idx1 = nextIndex(-1);
  idx2 = nextIndex(idx1);

  showCard(idx1, 1, true);
  showCard(idx2, 2, true);

  setCardsEnabled(true);
}

function displayTime(rec) {
  return isoToDisplay(rec.wrTime);
}

// Ripple эффект при клике
function spawnRipple(card, event) {
  const rect   = card.getBoundingClientRect();
  const size   = Math.max(rect.width, rect.height);
  const x      = (event.clientX - rect.left) - size / 2;
  const y      = (event.clientY - rect.top)  - size / 2;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  card.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

function showCard(index, position, animate = false) {
  const rec = pool[index];
  if (!rec) return;

  const card  = document.getElementById(`card${position}`);
  const gname = document.getElementById(`gname${position}`);
  const kname = document.getElementById(`kname${position}`);
  const timEl = document.getElementById(`time${position}`);
  const img   = document.getElementById(`img${position}`);
  const ph    = document.getElementById(`img${position}-placeholder`);

  gname.textContent = rec.gameName;
  kname.textContent = rec.catName;

  // Для карточки 1 — показываем время сразу, для карточки 2 — скрываем
  if (position === 1) {
    timEl.className = 'card-time known';
    timEl.textContent = displayTime(rec);
  } else {
    timEl.className = 'card-time hidden';
    timEl.textContent = '???';
  }

  // Анимация появления карточки
  if (animate) {
    card.classList.remove('fade-in');
    void card.offsetWidth;
    card.classList.add('fade-in');
  }

  // Сброс изображения
  img.classList.remove('loaded');
  img.src = '';
  ph.style.display = 'flex';

  const tryLoad = (url) => new Promise((resolve) => {
    const i = new Image();
    i.onload  = () => {
      img.src = url;
      img.classList.add('loaded');
      ph.style.display = 'none';
      resolve(true);
    };
    i.onerror = () => resolve(false);
    i.src = url;
  });

  (async () => {
    if (await tryLoad(rec.image)) return;
    await tryLoad(CORS_PROXY + encodeURIComponent(rec.image));
  })();
}

function animateScore(correct) {
  const el = document.getElementById('score');
  // Обновляем цвет счёта
  const val = parseInt(el.textContent, 10);
  el.classList.remove('positive', 'negative');
  if (val > 0) el.classList.add('positive');
  else if (val < 0) el.classList.add('negative');
  // Анимация
  el.classList.remove('score-pop');
  void el.offsetWidth;
  el.classList.add('score-pop');
  el.addEventListener('animationend', () => el.classList.remove('score-pop'), { once: true });
}

function cardClick(choice, event) {
  if (waitSwap || !gameStarted) return;

  // Ripple
  if (event) spawnRipple(document.getElementById(`card${choice}`), event);

  // Открываем скрытое время карточки 2 с анимацией
  const t2El = document.getElementById('time2');
  t2El.className = 'card-time known reveal';
  t2El.textContent = displayTime(pool[idx2]);
  t2El.addEventListener('animationend', () => t2El.classList.remove('reveal'), { once: true });

  const sec1 = pool[idx1].wrTimeSec;
  const sec2 = pool[idx2].wrTimeSec;

  const card1 = document.getElementById('card1');
  const card2 = document.getElementById('card2');
  card1.classList.remove('correct', 'wrong', 'draw');
  card2.classList.remove('correct', 'wrong', 'draw');

  if (Math.abs(sec1 - sec2) < 0.001) {
    // Ничья
    card1.classList.add('draw');
    card2.classList.add('draw');
  } else {
    const isCorrect = choice === 1 ? sec1 < sec2 : sec2 < sec1;
    document.getElementById(`card${choice}`).classList.add(isCorrect ? 'correct' : 'wrong');
    if (isCorrect) score++; else score--;
    document.getElementById('score').textContent = score;
    animateScore(isCorrect);
  }

  // Сдвиг: card2 → card1
  idx1 = idx2;
  idx2 = nextIndex(idx1);

  waitSwap = true;
  setCardsEnabled(false);

  swapTimer = setTimeout(() => {
    card1.classList.remove('correct', 'wrong', 'draw');
    card2.classList.remove('correct', 'wrong', 'draw');
    showCard(idx1, 1, false);
    showCard(idx2, 2, true);
    waitSwap = false;
    setCardsEnabled(true);
  }, SWAP_DELAY);
}

function setCardsEnabled(en) {
  const c1 = document.getElementById('card1');
  const c2 = document.getElementById('card2');
  if (en) {
    c1.classList.remove('disabled');
    c2.classList.remove('disabled');
  } else {
    c1.classList.add('disabled');
    c2.classList.add('disabled');
  }
}

  }
})();
